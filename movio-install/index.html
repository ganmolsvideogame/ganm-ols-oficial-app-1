<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Instalar Movio</title>
  <meta name="theme-color" content="#004C70" />
  <style>
    :root { --azul:#004C70; --escuro:#0A1C26; --claro:#E6F4FA; --dourado:#F7C744; --branco:#ffffff; }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; font-family:Arial,Helvetica,sans-serif; color:var(--branco);
      display:grid; place-items:center; padding:24px;
      background: radial-gradient(circle at 18% 12%, rgba(247,199,68,.22), transparent 26%), linear-gradient(145deg,var(--escuro) 0%,var(--azul) 54%,#073143 100%);
    }
    .phone { width:min(100%,420px); min-height:720px; border-radius:38px; padding:34px 22px 24px; background:linear-gradient(180deg,rgba(230,244,250,.12),rgba(10,28,38,.04)),rgba(10,28,38,.54); box-shadow:0 24px 70px rgba(0,0,0,.38); display:flex; flex-direction:column; align-items:center; justify-content:space-between; overflow:hidden; position:relative; }
    .map-lines { position:absolute; inset:0; opacity:.18; background-image:linear-gradient(32deg,transparent 40%,rgba(255,255,255,.8) 41%,rgba(255,255,255,.8) 42%,transparent 43%),linear-gradient(112deg,transparent 34%,rgba(255,255,255,.75) 35%,rgba(255,255,255,.75) 36%,transparent 37%),linear-gradient(0deg,transparent 62%,rgba(255,255,255,.5) 63%,rgba(255,255,255,.5) 64%,transparent 65%); background-size:170px 170px,210px 210px,145px 145px; pointer-events:none; }
    .top { position:relative; width:100%; text-align:center; padding-top:32px; }
    .logo-wrap { width:148px; height:148px; border-radius:34px; background:var(--azul); margin:0 auto 26px; display:grid; place-items:center; box-shadow:0 18px 42px rgba(0,0,0,.26); }
    .logo { width:128px; height:128px; object-fit:contain; display:block; border-radius:28px; }
    h1 { margin:0; font-size:44px; line-height:1; letter-spacing:0; font-weight:900; }
    .subtitle { margin:14px auto 0; max-width:310px; color:rgba(255,255,255,.78); font-size:17px; line-height:1.45; font-weight:700; }
    .card { position:relative; width:100%; border-radius:30px; padding:22px; background:var(--branco); color:var(--escuro); box-shadow:0 18px 48px rgba(0,0,0,.22); }
    .install { width:100%; min-height:64px; border:0; border-radius:18px; background:var(--azul); color:var(--branco); font-size:21px; font-weight:900; text-decoration:none; display:flex; align-items:center; justify-content:center; box-shadow:0 12px 24px rgba(0,76,112,.28); }
    .install:active { transform:translateY(1px); }
    .note { margin:16px 4px 0; color:#64748b; font-size:13px; line-height:1.35; text-align:center; font-weight:700; }
    .version { margin-top:18px; color:rgba(255,255,255,.65); font-size:12px; font-weight:800; position:relative; text-align:center; }
  </style>
</head>
<body>
  <main class="phone">
    <div class="map-lines"></div>
    <section class="top">
      <div class="logo-wrap"><img class="logo" src="https://files.catbox.moe/ii7uj8.png" alt="Movio" /></div>
      <h1>Movio</h1>
      <p class="subtitle">Mobilidade urbana com corridas, motoristas e rotas em tempo real.</p>
    </section>
    <section class="card">
      <a class="install" href="https://tmpfiles.org/dl/w2wVeOD8l7SF/movio.apk">Instalar</a>
      <p class="note">Ao tocar em instalar, o Android pode solicitar permissao para instalar apps fora da Play Store.</p>
    </section>
    <div class="version">APK 0.1.58 - code 59</div>
  </main>
</body>
</html>
